<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant M365 - Chatbot</title>
    <link rel="stylesheet" href="chat.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="header-content">
                <div class="bot-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="header-text">
                    <h1>Assistant M365</h1>
                    <p class="status">
                        <span class="status-dot"></span>
                        En ligne
                    </p>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="clearBtn" title="Effacer la conversation">
                    <i class="fas fa-trash"></i>
                </button>
                <button class="icon-btn" id="settingsBtn" title="Paramètres">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions" id="quickActions">
            <button class="quick-action-btn" data-message="Comment utiliser SharePoint ?">
                <i class="fas fa-share-alt"></i>
                SharePoint
            </button>
            <button class="quick-action-btn" data-message="Comment utiliser Teams ?">
                <i class="fas fa-users"></i>
                Teams
            </button>
            <button class="quick-action-btn" data-message="Comment utiliser OneDrive ?">
                <i class="fas fa-cloud"></i>
                OneDrive
            </button>
            <button class="quick-action-btn" data-message="Montre-moi les guides disponibles">
                <i class="fas fa-book"></i>
                Guides
            </button>
        </div>

        <!-- Chat Messages -->
        <div class="chat-messages" id="chatMessages">
            <!-- Welcome message -->
            <div class="message bot-message">
                <div class="message-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="message-content">
                    <div class="message-bubble">
                        <p>Bonjour ! 👋 Je suis votre assistant Microsoft 365.</p>
                        <p>Je peux vous aider avec <strong>SharePoint</strong>, <strong>Teams</strong> et <strong>OneDrive</strong>.</p>
                        <p>Comment puis-je vous aider aujourd'hui ?</p>
                    </div>
                    <div class="message-time">À l'instant</div>
                </div>
            </div>
        </div>

        <!-- Typing Indicator -->
        <div class="typing-indicator" id="typingIndicator">
            <div class="message-avatar">
                <i class="fas fa-robot"></i>
            </div>
            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input">
            <div class="input-wrapper">
                <button class="icon-btn" id="emojiBtn" title="Ajouter un emoji">
                    <i class="fas fa-smile"></i>
                </button>
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="Posez votre question..." 
                    autocomplete="off"
                    maxlength="500"
                >
                <button class="send-btn" id="sendBtn" title="Envoyer">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div class="input-info">
                <span id="charCount">0/500</span>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Message</span>
    </div>

    <script src="chat.js"></script>
</body>
</html>
